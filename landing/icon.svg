  <line x1="205" y1="145" x2="205" y2="220" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Data points on grid -->
  <circle cx="165" cy="165" r="5" fill="#1a1a1a"/>
  <circle cx="205" cy="185" r="5" fill="#1a1a1a"/>
  <circle cx="185" cy="205" r="5" fill="#1a1a1a"/>
