  <line x1="145" y1="165" x2="220" y2="165" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="145" y1="185" x2="220" y2="185" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="145" y1="205" x2="220" y2="205" stroke="#1a1a1a" stroke-width="2"/>
