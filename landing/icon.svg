  <!-- Top-left: Line chart -->
  <polyline points="48,105 68,85 82,95 100,60 115,75" fill="none" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Top-right: Scatter plot -->
  <circle cx="150" cy="70" r="4.5" fill="#1a1a1a"/>
  <circle cx="170" cy="55" r="4.5" fill="#1a1a1a"/>
  <circle cx="162" cy="82" r="4.5" fill="#1a1a1a"/>
  <circle cx="185" cy="65" r="4.5" fill="#1a1a1a"/>
  <circle cx="195" cy="85" r="4.5" fill="#1a1a1a"/>
  <circle cx="175" cy="98" r="4.5" fill="#1a1a1a"/>
  <circle cx="205" cy="72" r="4.5" fill="#1a1a1a"/>
  <circle cx="148" cy="95" r="4.5" fill="#1a1a1a"/>
  <circle cx="190" cy="50" r="3.5" fill="#1a1a1a"/>
  <circle cx="155" cy="105" r="3.5" fill="#1a1a1a"/>
  <circle cx="200" cy="100" r="3.5" fill="#1a1a1a"/>
  <circle cx="210" cy="55" r="3.5" fill="#1a1a1a"/>

  <!-- Bottom-left: Bar chart -->
  <rect x="40" y="198" width="14" height="17" rx="1" fill="#1a1a1a"/>
  <rect x="60" y="185" width="14" height="30" rx="1" fill="#1a1a1a"/>
