% # Light-mode defaults for themed components (overridden by dark toggle)
<style>
:root {
    --dip-surface: #f8fafc; --dip-surface-alt: #f1f5f9; --dip-border: #e2e8f0;
    --dip-text: #1e293b; --dip-text-muted: #64748b;
    --dip-callout-note-bg: #eff6ff; --dip-callout-note-border: #3b82f6; --dip-callout-note-text: #1e3a5f;
    --dip-callout-tip-bg: #f0fdf4;  --dip-callout-tip-border: #22c55e;  --dip-callout-tip-text: #14532d;
    --dip-callout-warn-bg: #fffbeb; --dip-callout-warn-border: #f59e0b; --dip-callout-warn-text: #78350f;
    --dip-callout-err-bg: #fef2f2;  --dip-callout-err-border: #ef4444;  --dip-callout-err-text: #7f1d1d;
    --dip-diff-add-bg: #bbf7d0; --dip-diff-add-text: #14532d;
    --dip-diff-rm-bg: #fecaca;  --dip-diff-rm-text: #7f1d1d;
    --dip-diff-chg-bg: #fde68a; --dip-diff-chg-text: #78350f;
    --dip-diff-header-bg: #f1f5f9;
    --dip-progress-bg: #e2e8f0; --dip-progress-label: #334155;
}
</style>
% if offline:
% # Offline mode: use system fonts instead of Google Fonts
<style>
:root { --dp-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
</style>
% # Inline CDN stylesheets
<style>{{ !inline_index_css }}</style>
<style>{{ !inline_tailwind_css }}</style>
% else:
<link
  href="https://fonts.googleapis.com/css?family=Inter:400,500,600,700|Inconsolata|Karla|Rubik&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="{{ cdn_base }}/report/index.css" />
<link rel="stylesheet" href="{{ cdn_base }}/report/tailwind.css" />
% end
<script>
  // analytics config
  window.dpAppRunner = false;
  window.dpLocal = true;

  // block types used in this report (for tree-shaking / lazy loading)
  window.dpBlockTypes = {{! block_types }};

  /* construct the view */
  const htmlHeader = `<style type="text/css">{{ !css_header }}</style>`;
  window.reportProps = { htmlHeader, isLightProse: {{is_light_prose}}, isOrg: false, mode: "VIEW", reportWidthClass: "{{ report_width_class }}" };

  if (!window.dpAppRunner) {
      // pass app data via props if in local (static) mode, otherwise this data is fetched from the server
      window.reportProps["appData"] = { data: { result: {{!app_data}} }};
  }
</script>
% if offline:
<script type="module">
  const _b64 = "{{ inline_js_b64 }}";
  const _src = atob(_b64);
  const _blob = new Blob([_src], {type: "application/javascript"});
  const _url = URL.createObjectURL(_blob);
  const { mountReport } = await import(_url);
  URL.revokeObjectURL(_url);
  mountReport(window.reportProps);
</script>
% else:
<script type="module">
  import { mountReport } from "{{ cdn_base }}/report/index.es.js";
  mountReport(window.reportProps);
</script>
% end
